{% extends 'base.html' %}

{% block content %}
<!-- Font Awesome para los íconos (ojo de contraseña) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<!-- Darle estilo al ícono del ojo de contraseña -->
<style>
    .password-wrapper {
        position: relative;
        display: flex;
        align-items: center;
    }
    .toggle-password {
        position: absolute;
        right: 15px;
        cursor: pointer;
        color: #666;
        z-index: 10;
    }
</style>

<div class="contenedor_sign"> 
    <div class="card">
        <!-- Títulos -->
        <div class="contenedor_sign_title">
            <h4>Iniciar Sesión</h4>
            <span>¿Aún no tienes cuenta? <a href="{% url 'signup' %}">Regístrate</a></span>
        </div>
        
        <!-- Formularios -->
        <div class="campo_gestion">
            {% if error %}
                <p class="error-message">{{ error }}</p>
            {% endif %}

            <form method="POST" action="{% url 'signin' %}">
                {% csrf_token %}
                
                <div class="campo_gestion">
                    <label>Usuario</label>
                    <input type="text" name="username" id="username" placeholder="Nombre o usuario del agente" required />
                </div>
                <div class="campo_gestion">
                    <label>Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" id="password" placeholder="Contraseña" required />
                        <i class="fa-solid fa-eye toggle-password" onclick="toggleVisibility('password', this)"></i>
                    </div>
                </div>
                
                <button type="submit" class="nav_boton nav_boton--signup" style="padding: 1rem; font-size: 1.8rem; width: 100%;">Entrar</button>
            </form>
        </div>

        <a class="link" href="#">¿Olvidaste tu contraseña?</a>
    </div>
</div>

<script>
    // Función para ver/ocultar contraseña
    function toggleVisibility(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }
</script>
{% endblock %}
